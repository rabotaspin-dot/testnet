<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Пополнение</title>
    <style>
        :root { --accent: #0088cc; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 10px; font-weight: 300; }
        .balance-box { font-size: 2em; font-weight: bold; color: #10b981; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; text-align: center; font-size: 1rem; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .status { margin-top: 15px; font-size: 0.9em; color: #94a3b8; min-height: 1.5em; }
        .comment-tag { background: #334155; padding: 5px 10px; border-radius: 5px; color: #38bdf8; font-family: monospace; }
        #pay-link { display: none; margin-top: 20px; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Баланс</h2>
    <div class="balance-box"><span id="balance">0.00</span> TON</div>
    
    <input type="number" id="amount" step="0.01" placeholder="Сумма пополнения (TON)">
    <button onclick="initiatePayment()">Создать счет</button>

    <div id="status" class="status"></div>

    <a id="pay-link" href="#">
        <button style="background: #22c55e;">Оплатить в кошельке</button>
    </a>
</div>

<script>
    // --- НАСТРОЙКИ ---
    const DEST_ADDRESS = "UQA3pwINrPEfzHHMlX17rTgeINTsRUNrPOnFkvOx7HN2HtNj"; // Вставьте сюда свой адрес
    // -----------------

    let currentBalance = parseFloat(localStorage.getItem('userBalance')) || 0;
    let checkInterval = null;
    let uniqueComment = "";

    // Загружаем баланс из localStorage при старте
    document.getElementById('balance').innerText = currentBalance.toFixed(2);

    function initiatePayment() {
        const amount = document.getElementById('amount').value;
        if (!amount || amount <= 0) return alert("Введите корректную сумму");

        // Генерируем уникальный комментарий
        uniqueComment = "INV-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        
        // Создаем диплинк
        // Нанотоны = TON * 10^9
        const nanoAmount = Math.floor(amount * 1000000000);
        const deeplink = `ton://transfer/${DEST_ADDRESS}?amount=${nanoAmount}&text=${encodeURIComponent(uniqueComment)}`;
        
        // Показываем кнопку оплаты
        const payLink = document.getElementById('pay-link');
        payLink.href = deeplink;
        payLink.style.display = "block";

        document.getElementById('status').innerHTML = `Ожидание оплаты транзакции с комментарием: <br><span class="comment-tag">${uniqueComment}</span>`;

        // Запускаем проверку (раз в 10 секунд)
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(() => checkBlockchain(amount, uniqueComment), 10000);
    }

    async function checkBlockchain(amount, comment) {
        try {
            // Используем публичное API Toncenter (v2)
            const url = `https://toncenter.com/api/v2/getTransactions?address=${DEST_ADDRESS}&limit=10`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.ok) {
                const transactions = data.result;
                
                for (let tx of transactions) {
                    const inMsg = tx.in_msg;
                    if (!inMsg) continue;

                    // Проверяем комментарий и сумму
                    const txComment = inMsg.message;
                    const txValue = inMsg.value / 1000000000; // перевод из нанотонов в TON

                    if (txComment === comment && txValue >= parseFloat(amount)) {
                        confirmPayment(txValue);
                        break;
                    }
                }
            }
        } catch (e) {
            console.error("Ошибка при проверке блокчейна:", e);
        }
    }

    function confirmPayment(value) {
        clearInterval(checkInterval);
        
        // Обновляем баланс
        currentBalance += value;
        localStorage.setItem('userBalance', currentBalance);
        
        // Обновляем интерфейс
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
        document.getElementById('status').innerHTML = "<span style='color: #10b981;'>Пополнение успешно!</span>";
        document.getElementById('pay-link').style.display = "none";
        
        alert(`Баланс пополнен на ${value} TON`);
    }
</script>

</body>
</html>
