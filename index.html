<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --accent-blue: #32a6ff;
            --blue-gradient: linear-gradient(180deg, #32a6ff 0%, #0076d1 100%);
            --dark-blue: #1a2a40;
            --text-main: #ffffff;
            --text-dim: #888888;
            --ton-blue: #0088cc;
            --status-green: #2ecc71;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 15px 0;
        }

        .header-panel {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--status-green);
        }

        .user-info {
            background: #111;
            padding: 5px 14px 5px 6px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #222;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .user-name-label {
            font-size: 14px;
            font-weight: 700;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .balance-panel {
            background: #111;
            padding: 4px 4px 4px 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #222;
        }

        .ton-icon {
            width: 24px;
            height: 24px;
            background: var(--ton-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ton-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .balance-amount {
            font-weight: 800;
            font-size: 16px;
        }

        .add-funds-btn {
            width: 34px;
            height: 34px;
            background: var(--blue-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(50, 166, 255, 0.3);
        }

        .app-container {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-screen {
            height: 250px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .multiplier {
            position: absolute;
            left: 25px;
            top: 30%;
            font-size: 54px;
            font-weight: 900;
            z-index: 10;
        }

        #loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
            width: 75%;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d90ff, #78c5ff);
            box-shadow: 0 0 15px rgba(50, 166, 255, 0.6);
        }

        .waiting-text {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            color: #ffffff;
        }

        .rocket-container {
            position: absolute;
            right: 10px;
            bottom: 20px;
            width: 180px;
            height: 180px;
            z-index: 5;
            transform: translateY(300px);
            opacity: 0;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
        }

        .rocket-on-position {
            transform: translateY(0);
            opacity: 1;
        }

        .rocket-active-pulse {
            animation: rocket-pulse 0.4s infinite alternate ease-in-out;
        }

        @keyframes rocket-pulse {
            from { transform: scale(1); filter: drop-shadow(0 0 0px rgba(50, 166, 255, 0)); }
            to { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(50, 166, 255, 0.4)); }
        }

        .rocket-fly-away {
            transform: translate(400px, -600px) rotate(-35deg) scale(1.8) !important;
            opacity: 0 !important;
            transition: transform 1.8s ease-in, opacity 0.8s !important;
        }

        .history {
            display: flex;
            gap: 8px;
            overflow-x: hidden;
            height: 35px;
            align-items: center;
        }

        .hist-item {
            background: #1a1a1a;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #888;
            min-width: fit-content;
        }

        .hist-item.active-now {
            background: linear-gradient(135deg, #0051ff, #002b85);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 81, 255, 0.4);
            animation: pulse-active 1.5s infinite;
        }

        @keyframes pulse-active {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .bet-button {
            background: linear-gradient(180deg, #1e88e5 0%, #1976d2 100%);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px; /* Чуть менее закругленные углы */
            font-weight: 900;    /* Плотный шрифт */
            font-size: 17px;      /* Капельку меньше */
            letter-spacing: 0.2px; /* Более плотные буквы */
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.5);
        }

        .bets-label {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 700;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .users-list {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 5px 15px;
            min-height: 200px;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e1e1e;
            transition: background-color 0.2s ease;
        }

        .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-profit {
            color: var(--text-main);
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .ton-mini-icon {
            width: 14px;
            height: 14px;
        }

        .lost-text {
            color: #ff4444;
        }
    </style>
</head>
<body>
<div class="header-panel">
    <div class="user-info">
        <div class="user-avatar" id="header-avatar">?</div>
        <div class="user-name-label" id="header-name">Игрок</div>
    </div>
    <div class="online-indicator">
        <div class="dot"></div>
        <span id="online-count">11</span>
    </div>
    <div class="balance-panel">
        <div class="ton-icon">
            <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" alt="TON">
        </div>
        <div class="balance-amount">0.00</div>
        <div class="add-funds-btn">+</div>
    </div>
</div>
<div class="app-container">
    <div class="game-screen">
        <div class="grid"></div>
        <div class="multiplier" id="counter">x1.00</div>
        <div id="loading-overlay">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <div class="waiting-text">Ожидание</div>
        </div>
        <div class="rocket-container" id="rocket">
            <dotlottie-player id="lottie" src="q.json" background="transparent" speed="1" style="width: 100%; height: 100%;" loop autoplay></dotlottie-player>
        </div>
    </div>
    <div class="history" id="history-bar"></div>
    <button class="bet-button">Сделать ставку</button>
    <div class="bets-label">
        <span>Ставки:</span>
        <span id="bet-count">0</span>
    </div>
    <div class="users-list" id="users-list"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const counterEl = document.getElementById('counter');
    const rocketEl = document.getElementById('rocket');
    const loadingOverlay = document.getElementById('loading-overlay');
    const fillEl = document.getElementById('fill');
    const historyBar = document.getElementById('history-bar');
    const usersList = document.getElementById('users-list');
    const betCountEl = document.getElementById('bet-count');
    const onlineCountEl = document.getElementById('online-count');

    let count = 1.00;
    let isWaiting = false;
    let activeHistoryItem = null;
    let allUsers = [];
    let permanentUser = null;
    let lastPermUpdate = 0;

    const fallbackUsers = [
        {name: "Ivan_HODL", color: "#FF5733"}, {name: "Crypto_Girl", color: "#F333FF"},
        {name: "TON_Master", color: "#0088cc"}, {name: "Alex777", color: "#33FF57"}
    ];

    // Генерация ставки: 75% - 0.10, остальные от 0.20 до 1.70
    function getRandomBet() {
        const r = Math.random();
        if (r < 0.75) return "0.10";
        const bets = ["0.20", "0.25", "0.30", "0.35", "0.40", "0.45", "0.50", "0.60", "0.70", "0.80", "0.90", "1.00", "1.20", "1.50", "1.70"];
        return bets[Math.floor(Math.random() * bets.length)];
    }

    // Генерация целевого множителя для выхода бота (от 1.5 до ~12)
    function getTargetMultiplier() {
        return 1.5 + Math.random() * 10.5;
    }

    function updateOnline() {
        let currentOnline = parseInt(localStorage.getItem('fake_online')) || 11;
        let lastUpdate = parseInt(localStorage.getItem('online_last_ts')) || 0;
        let now = Date.now();

        if (now - lastUpdate > 120000) {
            let change = Math.random() > 0.5 ? 1 : -1;
            currentOnline += change;
            if (currentOnline < 4) currentOnline = 4;
            localStorage.setItem('fake_online', currentOnline);
            localStorage.setItem('online_last_ts', now);
        }
        onlineCountEl.innerText = currentOnline;
    }

    async function loadUsers() {
        try {
            const response = await fetch('users.json');
            allUsers = await response.json();
        } catch (e) {
            allUsers = fallbackUsers;
        }
        updatePermanentUser();
    }

    function updatePermanentUser() {
        const now = Date.now();
        if (!permanentUser || (now - lastPermUpdate > 20 * 60 * 1000)) {
            permanentUser = allUsers[Math.floor(Math.random() * allUsers.length)];
            lastPermUpdate = now;
        }
    }

    function setupUserData() {
        const headerName = document.getElementById('header-name');
        const headerAvatar = document.getElementById('header-avatar');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            headerName.innerText = user.first_name || "Игрок";
            headerAvatar.innerText = (user.first_name || "И").charAt(0).toUpperCase();
            headerAvatar.style.background = "#32a6ff";
        }
    }

    function initHistory() {
        for(let i=0; i<6; i++) {
            const val = (Math.random() * 3 + 1).toFixed(2);
            addHistoryItem(`x${val}`);
        }
    }

    function addHistoryItem(text, isActive = false) {
        const div = document.createElement('div');
        div.className = isActive ? 'hist-item active-now' : 'hist-item';
        div.innerText = text;
        historyBar.prepend(div);
        if(historyBar.children.length > 8) historyBar.lastChild.remove();
        return div;
    }

    function renderUserRow(user, bet) {
        const row = document.createElement('div');
        row.className = 'user-row';
        const targetMult = getTargetMultiplier();
        row.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar-small" style="background:${user.color || '#444'}">${user.name.charAt(0).toUpperCase()}</div>
                <div class="user-name">${user.name}</div>
            </div>
            <div class="user-profit" data-base-bet="${bet}">${bet} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon"></div>
        `;
        row.setAttribute('data-cashed', 'false');
        row.setAttribute('data-target', targetMult);
        row.setAttribute('data-base-bet', bet);
        usersList.appendChild(row);
    }

    function updateBotProfit(row, currentMultiplier) {
        if (row.getAttribute('data-cashed') === 'true') return;
        const profitDiv = row.querySelector('.user-profit');
        const baseBet = parseFloat(profitDiv.getAttribute('data-base-bet'));
        if (isNaN(baseBet)) return;
        const newWin = (baseBet * currentMultiplier).toFixed(2);
        profitDiv.innerHTML = `${newWin} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
    }

    function tryCashout(row, currentMultiplier) {
        if (row.getAttribute('data-cashed') === 'true') return false;
        const target = parseFloat(row.getAttribute('data-target'));
        if (currentMultiplier >= target) {
            const profitDiv = row.querySelector('.user-profit');
            const baseBet = parseFloat(profitDiv.getAttribute('data-base-bet'));
            const winAmount = (baseBet * currentMultiplier).toFixed(2);
            profitDiv.innerHTML = `${winAmount} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
            row.setAttribute('data-cashed', 'true');
            return true;
        }
        return false;
    }

    function startWaiting() {
        isWaiting = true;
        updateOnline();
        updatePermanentUser();
        usersList.innerHTML = "";
        betCountEl.innerText = "0";

        counterEl.style.display = "none";
        rocketEl.style.display = "none";
        rocketEl.classList.remove('rocket-on-position', 'rocket-fly-away', 'rocket-active-pulse');
        loadingOverlay.style.display = "flex";

        // Количество игроков: 60% — 3-4, 40% — 1-2
        let playersCount;
        if (Math.random() < 0.6) {
            playersCount = Math.floor(Math.random() * 2) + 3; // 3 или 4
        } else {
            playersCount = Math.floor(Math.random() * 2) + 1; // 1 или 2
        }

        // Уникальные пользователи в текущей игре (чтобы не было повторов)
        const usedUsers = new Set();
        // Добавляем permanentUser, если он ещё не использован (но permanentUser может быть один)
        // В процессе будем выбирать только уникальных

        let currentInList = 0;
        // Для каждого игрока генерируем задержку:
        // первая ставка (i=0) от 2000 до 3000 мс, остальные от 2000 до 5000 мс
        // Задержки не зависят от сценария, чтобы гарантировать минимум 2 секунды

        for (let i = 0; i < playersCount; i++) {
            let delay;
            if (i === 0) {
                delay = 2000 + Math.random() * 1000; // 2000-3000 мс
            } else {
                delay = 2000 + Math.random() * 3000; // 2000-5000 мс
            }

            setTimeout(() => {
                if (!isWaiting) return;

           // Выбор уникального пользователя
                let candidateUser = null;
                // Для первого игрока (i=0) предпочтение permanentUser, если он ещё не использован
                if (i === 0 && !usedUsers.has(permanentUser.name)) {
                    candidateUser = permanentUser;
                } else {
                    // Собираем доступных пользователей (не использованных)
                    const available = allUsers.filter(u => !usedUsers.has(u.name));
                    if (available.length === 0) {
                        // Если всех использовали (маловероятно, но на всякий случай), сбрасываем set
                        usedUsers.clear();
                        candidateUser = allUsers[Math.floor(Math.random() * allUsers.length)];
                    } else {
                        candidateUser = available[Math.floor(Math.random() * available.length)];
                    }
                }

                usedUsers.add(candidateUser.name);
                renderUserRow(candidateUser, getRandomBet());
                currentInList++;
                betCountEl.innerText = currentInList;
            }, delay);
        }

        let progress = 0;
        const timer = setInterval(() => {
            progress += 0.6;
            fillEl.style.width = `${progress}%`;
            if (progress >= 100) {
                clearInterval(timer);
                startFlight();
            }
        }, 30);
    }

    function startFlight() {
        isWaiting = false;
        count = 1.00;
        loadingOverlay.style.display = "none";
        fillEl.style.width = "0%";
        counterEl.style.display = "block";
        counterEl.style.color = "white";
        rocketEl.style.display = "block";
        setTimeout(() => rocketEl.classList.add('rocket-on-position'), 20);
        activeHistoryItem = addHistoryItem(`x1.00`, true);

        const gameLoop = setInterval(() => {
            // Решение о краше
            if (Math.random() < 0.015 && count > 1.3) {
                crash(gameLoop);
                return;
            }

            // Увеличение множителя
            let increment = 0.01 + (count * 0.008);
            if (count > 2.5) increment *= 1.5;
            count += increment;
            counterEl.innerText = `x${count.toFixed(2)}`;
            if (activeHistoryItem) activeHistoryItem.innerText = `x${count.toFixed(2)}`;
            if (count >= 2.5 && !rocketEl.classList.contains('rocket-active-pulse')) {
                rocketEl.classList.add('rocket-active-pulse');
            }

            // Обновляем всех ботов и проверяем досрочный выход
            const rows = document.querySelectorAll('.user-row');
            rows.forEach(row => {
                const cashed = tryCashout(row, count);
                if (!cashed && row.getAttribute('data-cashed') !== 'true') {
                    updateBotProfit(row, count);
                }
            });
        }, 50);
    }

    function crash(loop) {
        clearInterval(loop);
        counterEl.style.color = "#ff4444";
        rocketEl.classList.remove('rocket-active-pulse');
        setTimeout(() => rocketEl.classList.add('rocket-fly-away'), 20);

        // Обработка всех ботов, которые ещё не вышли (data-cashed != 'true')
        const rows = document.querySelectorAll('.user-row');
        rows.forEach(row => {
            if (row.getAttribute('data-cashed') === 'true') return;

            const profitDiv = row.querySelector('.user-profit');
            const baseBet = parseFloat(profitDiv.getAttribute('data-base-bet'));
            // 40% проигрывают, 60% успевают
            const success = Math.random() < 0.6;
            let finalWin = 0;
            if (success) {
                finalWin = baseBet * count;
                profitDiv.innerHTML = `${finalWin.toFixed(2)} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
            } else {
                profitDiv.innerHTML = `0.00 <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
                profitDiv.classList.add('lost-text');
            }
            row.setAttribute('data-cashed', 'true');
        });

        if (activeHistoryItem) {
            activeHistoryItem.classList.remove('active-now');
            activeHistoryItem = null;
        }
        setTimeout(startWaiting, 2500);
    }

    loadUsers().then(() => {
        setupUserData();
        initHistory();
        startWaiting();
    });
</script>
</body>
</html>
