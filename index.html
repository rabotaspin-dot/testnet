<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Pro Dashboard</title>
    <style>
        :root { --accent: #0088cc; --bg: #0b0f1a; --card: #161e2d; --log-bg: #000000; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: #e2e8f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; border: 1px solid #2d3748; margin-bottom: 20px; }
        .balance-display { font-size: 2.5em; color: #10b981; margin: 15px 0; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: #38bdf8; border-radius: 8px; margin-bottom: 10px; font-size: 1.1em; text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1em; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-pay { background: #22c55e; color: white; text-decoration: none; display: none; margin-top: 15px; line-height: 50px; height: 50px; }
        .log-container { background: var(--log-bg); border-radius: 10px; padding: 15px; border: 1px solid #334155; height: 300px; overflow-y: auto; font-size: 0.85em; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #334155; padding-left: 10px; }
        .log-success { color: #10b981; font-weight: bold; }
        .log-error { color: #ef4444; }
        .tag { color: #38bdf8; background: #1e293b; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div style="color: #94a3b8;">Ваш баланс (Localhost)</div>
        <div class="balance-display"><span id="balance">0.00</span> TON</div>
        
        <input type="number" id="amount" step="0.1" placeholder="Введите сумму в TON">
        <button class="btn btn-primary" id="start-btn" onclick="initiate()">Создать счет</button>

        <div id="pay-area">
            <p id="comm-info" style="display:none">Комментарий: <span class="tag" id="target-comm"></span></p>
            <a id="pay-link" href="#" class="btn btn-pay">ОТКРЫТЬ КОШЕЛЕК</a>
        </div>
    </div>

    <div class="log-container" id="logs">
        <div class="log-entry">Система готова. Используется API Key.</div>
    </div>
</div>

<script>
    // --- ОБЯЗАТЕЛЬНЫЕ НАСТРОЙКИ ---
    const WALLET_ADDR = "UQA3pwINrPEfzHHMlX17rTgeINTsRUNrPOnFkvOx7HN2HtNj"; 
    const API_KEY = "0a09095ad9a7b58975f300fe9812b9c4472ea2650b5c2781fe7dd8f6961e73b2"; 
    // ------------------------------

    let balance = parseFloat(localStorage.getItem('ton_bal')) || 0;
    let checkTimer = null;
    let startTime = 0; // Время создания счета

    document.getElementById('balance').innerText = balance.toFixed(2);

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = 'log-entry ' + (type ? 'log-' + type : '');
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        const logs = document.getElementById('logs');
        logs.prepend(div);
    }

    function initiate() {
        const amt = document.getElementById('amount').value;
        if (!amt || amt < 0.01) return alert("Минимум 0.01 TON");

        const comment = "INV" + Math.floor(Math.random() * 999999);
        startTime = Math.floor(Date.now() / 1000); // Запоминаем время

        document.getElementById('target-comm').innerText = comment;
        document.getElementById('comm-info').style.display = 'block';
        
        const nano = Math.floor(amt * 1000000000);
        document.getElementById('pay-link').href = `ton://transfer/${WALLET_ADDR}?amount=${nano}&text=${comment}`;
        document.getElementById('pay-link').style.display = 'block';

        log(`Счет создан на ${amt} TON. Комментарий: ${comment}`, 'success');
        
        if(checkTimer) clearInterval(checkTimer);
        checkTimer = setInterval(() => verify(amt, comment), 3000);
    }

    async function verify(targetAmt, targetComm) {
        log(`Проверка транзакций... (API Key active)`);
        
        try {
            const res = await fetch(`https://toncenter.com/api/v2/getTransactions?address=${WALLET_ADDR}&limit=15&api_key=${API_KEY}`);
            const data = await res.json();

            if (data.ok) {
                for (let tx of data.result) {
                    // Проверяем только входящие, которые были ПОСЛЕ нажатия кнопки
                    if (tx.utime < startTime) continue; 
                    
                    const msg = tx.in_msg;
                    if (msg && msg.message === targetComm) {
                        const val = msg.value / 1000000000;
                        if (val >= parseFloat(targetAmt)) {
                            finalize(val);
                            break;
                        }
                    }
                }
            }
        } catch (e) {
            log("Ошибка API: " + e.message, "error");
        }
    }

    function finalize(amount) {
        clearInterval(checkTimer);
        balance += amount;
        localStorage.setItem('ton_bal', balance);
        document.getElementById('balance').innerText = balance.toFixed(2);
        document.getElementById('pay-link').style.display = 'none';
        document.getElementById('comm-info').style.display = 'none';
        log(`ПОЛУЧЕНО ${amount} TON. Баланс обновлен.`, "success");
        alert("Оплата получена!");
    }
</script>

</body>
</html>
